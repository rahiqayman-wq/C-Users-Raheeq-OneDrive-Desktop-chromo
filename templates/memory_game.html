<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #8cdc88b8 0%, #4ba264 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .back-btn {
            background: #4ecdc4;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 25px;
            display: inline-block;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #3dbeb5;
            transform: scale(1.05);
        }

        .game-header {
            background: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .game-title {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .stat {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 15px;
            min-width: 120px;
        }

        .memory-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 30px auto;
            max-width: 500px;
        }

        .memory-card {
            width: 100px;
            height: 100px;
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            cursor: pointer;
            transition: all 0.3s ease;
            transform-style: preserve-3d;
            border: 3px solid white;
        }

        .memory-card.flipped {
            background: white;
            transform: rotateY(180deg);
        }

        .memory-card.matched {
            background: #27ae60;
            cursor: default;
        }

        @keyframes celebration {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .celebration {
            animation: celebration 0.5s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="{{ url_for('games_dashboard') }}" class="back-btn">← Back to Games</a>
        
        <div class="game-header">
            <h1 class="game-title">🧠 Memory Game</h1>
            <div class="stats">
                <div class="stat">
                    <div>⏱️ Time</div>
                    <div id="timer">0</div>
                </div>
                <div class="stat">
                    <div>🔄 Moves</div>
                    <div id="moves">0</div>
                </div>
                <div class="stat">
                    <div>✅ Matches</div>
                    <div id="matches">0/6</div>
                </div>
            </div>
        </div>

        <div class="memory-board">
            {% for card in cards %}
            <div class="memory-card" data-card="{{ card.id }}" data-emoji="{{ card.emoji }}">
                <span style="display: none;">?</span>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        let flippedCards = [];
        let matches = 0;
        let moves = 0;
        let canFlip = true;
        let startTime = Date.now();
        let timerInterval;

        // Start timer
        function startTimer() {
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                document.getElementById('timer').textContent = elapsed + 's';
            }, 1000);
        }

   
        function stopTimer() {
            clearInterval(timerInterval);
        }

        startTimer();

        document.querySelectorAll('.memory-card').forEach(card => {
            card.addEventListener('click', () => {
                if (!canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) {
                    return;
                }

                card.classList.add('flipped');
                card.innerHTML = `<span>${card.dataset.emoji}</span>`;
                flippedCards.push(card);

                if (flippedCards.length === 2) {
                    moves++;
                    document.getElementById('moves').textContent = moves;
                    canFlip = false;

                    const [card1, card2] = flippedCards;
                    if (card1.dataset.card === card2.dataset.card) {
                        card1.classList.add('matched');
                        card2.classList.add('matched');
                        matches++;
                        document.getElementById('matches').textContent = `${matches}/6`;
                        
                        flippedCards = [];
                        canFlip = true;

                        if (matches === 6) {
                            setTimeout(() => {
                                stopTimer();
                                const timeTaken = Math.floor((Date.now() - startTime) / 1000);
                                completeGame(timeTaken, moves);
                            }, 500);
                        }
                    } else {
                        setTimeout(() => {
                            card1.classList.remove('flipped');
                            card2.classList.remove('flipped');
                            card1.innerHTML = '<span style="display: none;">?</span>';
                            card2.innerHTML = '<span style="display: none;">?</span>';
                            flippedCards = [];
                            canFlip = true;
                        }, 1000);
                    }
                }
            });
        });

        function completeGame(time, moves) {
            alert(`🎉 Congratulations! You completed the game in ${time} seconds with ${moves} moves!`);
            
            fetch('/api/memory/complete', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    time: time,
                    moves: moves
                })
            }).then(() => {
                window.location.href = "{{ url_for('games_dashboard') }}";
            });
        }
    </script>
</body>
</html>
