<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% if title %}
    <title>Pythonic - {{title}}</title>
    {% else %}
    <title>Pythonic</title>
    {%endif%}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link rel="stylesheet" type="text/css" href="{{url_for('static', filename='main.css')}}">
</head>

<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg bg-white navbar-light py-3 fixed-top shadow-sm">
    <div class="container d-flex align-items-center">
        <a href="{{ url_for('home') }}" class="navbar-brand d-flex align-items-center">
            <img src="{{ url_for('static', filename='roro.png') }}" alt="Logo" class="logo-img">
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navmenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navmenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a href="#" class="nav-link custom-link">Home</a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('sign') }}" class="nav-link custom-link">Sign up</a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('home') }}" class="nav-link custom-link">Log in</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link custom-link">Contact</a>
                </li>
            </ul>
        </div
    </div>
</nav>

<style>
    .logo-img {
        height: 40px;       
        width: auto;
        transform: scale(1.5); 
        transform-origin: left center;
    }

    .custom-link {
        background-color: #d9f0d9;
        color: #2f5e2f !important;
        padding: 6px 15px;
        margin: 0 5px;
        border-radius: 8px;
        font-weight: bold;
        transition: all 0.3s ease-in-out;
    }

    .custom-link:hover {
        background-color: #2f5e2f;
        color: white !important;
    }
</style>

    {% block content%} 
    {% endblock %}


    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</body>
</html>
