<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colors Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4aa56d,  lab(56% -49.22 23.12 / 0.737) 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
        }

        .back-btn {
            background: #4ecdc4;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 25px;
            display: inline-block;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #3dbeb5;
            transform: scale(1.05);
        }

        .game-header {
            background: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .game-title {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .stat {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 15px;
            min-width: 120px;
        }

        .game-area {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .color-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 4px solid transparent;
        }

        .color-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .color-swatch {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 15px;
            border: 4px solid white;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .color-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .object-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 4px solid transparent;
        }

        .object-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .object-emoji {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .object-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #2c3e50;
        }

        .selected {
            border-color: #4ecdc4;
            background: #e8f6f3;
        }

        .correct {
            border-color: #27ae60;
            background: #d5f4e6;
        }

        .incorrect {
            border-color: #ff6b6b;
            background: #ffe6e6;
        }

        .match-area {
            background: white;
            padding: 30px;
            border-radius: 20px;
            margin: 20px 0;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .current-selection {
            font-size: 1.5em;
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        .match-btn {
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 25px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
        }

        .match-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255,107,107,0.4);
        }

        .match-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
        }

        .complete-btn {
            background: linear-gradient(45deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            display: none;
        }

        .complete-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);
        }

        @keyframes celebration {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .celebration {
            animation: celebration 0.5s ease-in-out;
            font-size: 4em;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="{{ url_for('games_dashboard') }}" class="back-btn">← Back to Games</a>
        
        <div class="game-header">
            <h1 class="game-title">🎨 Colors Game</h1>
            <div class="stats">
                <div class="stat">
                    <div>⏱️ Time</div>
                    <div id="timer">0</div>
                </div>
                <div class="stat">
                    <div>✅ Matches</div>
                    <div id="matches">0/4</div>
                </div>
                <div class="stat">
                    <div>⭐ Score</div>
                    <div id="score">0</div>
                </div>
            </div>
        </div>

        <div class="match-area">
            <div class="current-selection" id="currentSelection">
                Select a color and an object to match!
            </div>
            <button class="match-btn" id="matchBtn" disabled>Match Selected Items</button>
        </div>

        <h3 style="color: white; margin: 20px 0;">Colors:</h3>
        <div class="game-area">
            {% for color in colors %}
            <div class="color-card" data-color="{{ color.color }}" data-name="{{ color.name }}">
                <div class="color-swatch" style="background: {{ color.color }};"> </div>
                <div class="color-name">{{ color.name }}</div>
            </div>
            {% endfor %}
        </div>

        <h3 style="color: white; margin: 20px 0;">Objects:</h3>
        <div class="game-area">
            {% for color in colors %}
            <div class="object-card" data-color="{{ color.color }}" data-emoji="{{ color.emoji }}">
                <div class="object-emoji">{{ color.emoji }}</div>
                <div class="object-name">What color?</div>
            </div>
            {% endfor %}
        </div>

        <button class="complete-btn" id="completeBtn">🎉 Complete Game!</button>
    </div>

    <script>
        let selectedColor = null;
        let selectedObject = null;
        let correctMatches = 0;
        let startTime = Date.now();
        let timerInterval;
        let score = 0;

        const correctMatchesMap = {
            '#FF6B6B': '🍎', // Red - Apple
            '#4ECDC4': '🔵', // Blue - Ball
            '#FFE66D': '🌞', // Yellow - Sun
            '#6A4C93': '🍇'  // Purple - Grapes
        };

        // Start timer
        function startTimer() {
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                document.getElementById('timer').textContent = elapsed + 's';
                updateScore();
            }, 1000);
        }

        // Update score
        function updateScore() {
            const timeBonus = Math.max(100 - Math.floor((Date.now() - startTime) / 1000), 0);
            const matchesBonus = correctMatches * 25;
            score = timeBonus + matchesBonus;
            document.getElementById('score').textContent = score;
        }

        startTimer();

        // Color selection
        document.querySelectorAll('.color-card').forEach(card => {
            card.addEventListener('click', () => {
              
                document.querySelectorAll('.color-card').forEach(c => {
                    c.classList.remove('selected');
                });
                
                // Select current color
                card.classList.add('selected');
                selectedColor = card.dataset.color;
                
                updateSelectionText();
                checkIfReadyToMatch();
            });
        });

        // Object selection
        document.querySelectorAll('.object-card').forEach(card => {
            card.addEventListener('click', () => {
               
                document.querySelectorAll('.object-card').forEach(o => {
                    o.classList.remove('selected');
                });
                
                // Select current object
                card.classList.add('selected');
                selectedObject = card.dataset.emoji;
                
                updateSelectionText();
                checkIfReadyToMatch();
            });
        });

        function updateSelectionText() {
            const colorName = selectedColor ? document.querySelector(`[data-color="${selectedColor}"] .color-name`).textContent : '___';
            const objectEmoji = selectedObject ? selectedObject : '___';
            
            document.getElementById('currentSelection').innerHTML = `
                <strong>Selected:</strong> ${colorName} color with ${objectEmoji} object
            `;
        }

        function checkIfReadyToMatch() {
            const matchBtn = document.getElementById('matchBtn');
            if (selectedColor && selectedObject) {
                matchBtn.disabled = false;
            } else {
                matchBtn.disabled = true;
            }
        }

        // Match button click
        document.getElementById('matchBtn').addEventListener('click', () => {
            const isCorrect = correctMatchesMap[selectedColor] === selectedObject;
            
            if (isCorrect) {
                // Correct match
                markCorrectMatch();
                correctMatches++;
                document.getElementById('matches').textContent = `${correctMatches}/4`;
                updateScore();
                
                
                if (correctMatches === 4) {
                    setTimeout(() => {
                        completeGame();
                    }, 1000);
                }
            } else {
                markIncorrectMatch();
            }
            
           
            resetSelection();
        });

        function markCorrectMatch() {
       
            const colorCard = document.querySelector(`[data-color="${selectedColor}"]`);
            colorCard.classList.add('correct');
            colorCard.style.pointerEvents = 'none';
            
           
            const objectCard = document.querySelector(`[data-emoji="${selectedObject}"]`);
            objectCard.classList.add('correct');
            objectCard.style.pointerEvents = 'none';
            
        
            showFeedback('🎉 Correct Match!', 'success');
        }

        function markIncorrectMatch() {
         
            const colorCard = document.querySelector(`[data-color="${selectedColor}"]`);
            const objectCard = document.querySelector(`[data-emoji="${selectedObject}"]`);
            
            colorCard.classList.add('incorrect');
            objectCard.classList.add('incorrect');
            
            setTimeout(() => {
                colorCard.classList.remove('incorrect');
                objectCard.classList.remove('incorrect');
            }, 1000);
            
            showFeedback('❌ Try again!', 'error');
        }

        function resetSelection() {
            selectedColor = null;
            selectedObject = null;
            
            document.querySelectorAll('.color-card').forEach(c => {
                c.classList.remove('selected');
            });
            
            document.querySelectorAll('.object-card').forEach(o => {
                o.classList.remove('selected');
            });
            
            document.getElementById('matchBtn').disabled = true;
            updateSelectionText();
        }

        function showFeedback(message, type) {
            const feedback = document.createElement('div');
            feedback.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: ${type === 'success' ? '#27ae60' : '#ff6b6b'};
                color: white;
                padding: 20px 40px;
                border-radius: 15px;
                font-size: 1.5em;
                font-weight: bold;
                z-index: 1000;
                box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            `;
            feedback.textContent = message;
            
            document.body.appendChild(feedback);
            
            setTimeout(() => {
                feedback.remove();
            }, 1000);
        }

        function completeGame() {
            clearInterval(timerInterval);
            const timeTaken = Math.floor((Date.now() - startTime) / 1000);
            
       
            const celebration = document.createElement('div');
            celebration.className = 'celebration';
            celebration.textContent = '🎉 All Matches Found! 🎉';
            document.querySelector('.game-header').appendChild(celebration);
            
          
            document.getElementById('completeBtn').style.display = 'inline-block';
            
         
            document.getElementById('completeBtn').addEventListener('click', () => {
                saveProgress(timeTaken);
            });
        }

        function saveProgress(timeTaken) {
            fetch('/api/colors/complete', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    matches: correctMatches,
                    time: timeTaken
                })
            }).then(response => response.json())
              .then(data => {
                  alert(`🎊 Excellent! You scored ${data.score} points!\nTime: ${timeTaken} seconds`);
                  window.location.href = "{{ url_for('games_dashboard') }}";
              });
        }
    </script>
</body>
</html>
