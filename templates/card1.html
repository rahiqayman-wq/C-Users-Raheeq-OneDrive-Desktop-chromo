<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الألعاب التعليمية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e8e 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        .back-btn {
            background: #4ecdc4;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 25px;
            display: inline-block;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: #3dbeb5;
            transform: scale(1.05);
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        p {
            color: #7f8c8d;
            font-size: 1.2em;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="{{ url_for('home') }}" class="back-btn">← العودة للرئيسية</a>
        <h1>🎮 الألعاب التعليمية</h1>
        <p>هنا ستجد مجموعة رائعة من الألعاب التعليمية المصممة خصيصًا لتنمية مهارات الأطفال</p>
        <p>🎯 الألعاب المتاحة:</p>
        <ul style="text-align: right; margin: 20px 0;">
            <li>🧩 ألعاب البازل والتركيب</li>
            <li>🎨 ألعاب التلوين والإبداع</li>
            <li>🔷 ألعاب الأشكال والألوان</li>
        </ul>
    </div>
</body>
</html>
