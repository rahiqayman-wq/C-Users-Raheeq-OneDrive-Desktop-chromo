
<style>
    :root {
        --primary: #4ECDC4;
        --secondary: #FF6B6B;
        --accent: #FFE66D;
        --green-light: #8BC694;
        --green-dark: #5C9367;
        --green-darker: #4a7a52;
        --text-dark: #2C3E50;
        --text-light: #FFFFFF;
        --card-bg: #F8F9FA;
        --shadow: 0 8px 30px rgba(0,0,0,0.1);
        --shadow-hover: 0 15px 40px rgba(0,0,0,0.15);
    }

    body {
        background: linear-gradient(135deg, #e8f0e8 0%, #d4e7d4 100%);
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .page-container {
        display: flex;
        width: 100%;
        max-width: 1400px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        box-shadow: var(--shadow);
        overflow: hidden;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
    }

    /* ==== Enhanced Sidebar ==== */
    .sidebar {
        width: 280px;
        background: linear-gradient(180deg, var(--green-light) 0%, var(--green-dark) 100%);
        padding: 30px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        flex-shrink: 0;
        position: relative;
        overflow: hidden;
    }

    .sidebar::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--primary), var(--accent), var(--secondary));
    }

    .sidebar .profile-pic {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: #fff url('{{ url_for("static", filename="user.png") }}') center/cover no-repeat;
        margin-bottom: 20px;
        border: 4px solid white;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        position: relative;
        z-index: 2;
    }

    .sidebar .username {
        color: var(--text-light);
        font-size: 1.4rem;
        font-weight: 700;
        margin-bottom: 40px;
        text-align: center;
        text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }

    .sidebar .nav-buttons {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .sidebar button {
        width: 100%;
        padding: 15px 20px;
        margin: 0;
        border: none;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.15);
        color: var(--text-light);
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        display: flex;
        align-items: center;
        gap: 12px;
        text-align: left;
    }

    .sidebar button i {
        font-size: 1.2rem;
        width: 24px;
        text-align: center;
    }

    .sidebar button:hover {
        background: rgba(255, 255, 255, 0.25);
        transform: translateX(5px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .sidebar .logout-btn {
        margin-top: auto;
        background: rgba(255, 255, 255, 0.1);
        border: 2px solid rgba(255, 255, 255, 0.3);
    }

    .sidebar .logout-btn:hover {
        background: rgba(255, 107, 107, 0.3);
        border-color: rgba(255, 255, 255, 0.5);
    }

    /* ==== Enhanced Main Content ==== */
    .main {
        flex-grow: 1;
        padding: 40px;
        background: transparent;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 30px;
        align-content: start;
    }

    .main-header {
        grid-column: 1 / -1;
        text-align: center;
        margin-bottom: 20px;
    }

    .welcome-title {
        color: var(--text-dark);
        font-size: 2.5rem;
        font-weight: 800;
        margin-bottom: 10px;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .welcome-subtitle {
        color: var(--green-dark);
        font-size: 1.2rem;
        font-weight: 500;
    }

    /* ==== Enhanced Cards ==== */
    .card-link {
        text-decoration: none;
        color: inherit;
        width: 100%;
        transition: all 0.3s ease;
    }

    .card-link:hover {
        transform: translateY(-8px);
    }

    .card {
        background: var(--card-bg);
        border-radius: 20px;
        width: 100%;
        aspect-ratio: 1/1;
        text-align: center;
        box-shadow: var(--shadow);
        transition: all 0.3s ease;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 0;
        overflow: hidden;
        position: relative;
        border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 5px;
        background: linear-gradient(90deg, var(--primary), var(--accent), var(--secondary));
    }

    .card:hover {
        box-shadow: var(--shadow-hover);
        transform: translateY(-8px) scale(1.02);
    }

    .card-image-container {
        width: 100%;
        height: 65%;
        overflow: hidden;
        position: relative;
    }

    .card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s ease;
    }

    .card:hover img {
        transform: scale(1.1);
    }

    .card-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.1));
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    .card:hover .card-overlay {
        opacity: 1;
    }

    .card-content {
        padding: 20px 15px;
        background: white;
        flex-grow: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
    }

    .card h3 {
        color: var(--text-dark);
        font-size: 1.2rem;
        font-weight: 700;
        margin: 0;
        padding: 12px 20px;
        background: rgba(139, 198, 148, 0.1);
        border-radius: 10px;
        border: 2px solid rgba(139, 198, 148, 0.2);
        transition: all 0.3s ease;
    }

    .card:hover h3 {
        background: var(--green-light);
        color: white;
        border-color: var(--green-light);
    }

    .card-badge {
        position: absolute;
        top: -15px;
        right: 15px;
        background: var(--secondary);
        color: white;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 700;
        box-shadow: 0 3px 10px rgba(255, 107, 107, 0.3);
    }

    @media (max-width: 1024px) {
        .page-container {
            flex-direction: column;
        }
        
        .sidebar {
            width: 100%;
            padding: 20px;
            flex-direction: row;
            justify-content: space-between;
        }
        
        .sidebar .profile-pic {
            width: 60px;
            height: 60px;
            margin-bottom: 0;
        }
        
        .sidebar .username {
            margin-bottom: 0;
            font-size: 1.2rem;
        }
        
        .sidebar .nav-buttons {
            flex-direction: row;
            gap: 10px;
        }
        
        .sidebar button {
            padding: 10px 15px;
            font-size: 0.9rem;
        }
        
        .sidebar button span {
            display: none;
        }
        
        .main {
            padding: 20px;
        }
    }

    @media (max-width: 768px) {
        .main {
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        
        .welcome-title {
            font-size: 2rem;
        }
        
        .sidebar {
            flex-wrap: wrap;
        }
        
        .sidebar .nav-buttons {
            order: 3;
            flex-basis: 100%;
            margin-top: 15px;
        }
    }

    @media (max-width: 480px) {
        .main {
            grid-template-columns: 1fr;
        }
        
        body {
            padding: 10px;
        }
        
        .main {
            padding: 15px;
        }
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .card {
        animation: fadeInUp 0.6s ease forwards;
    }

    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }
    .card:nth-child(4) { animation-delay: 0.4s; }
    .card:nth-child(5) { animation-delay: 0.5s; }
    .card:nth-child(6) { animation-delay: 0.6s; }
    .card:nth-child(7) { animation-delay: 0.7s; }
</style>
