{% extends "tempelate.html" %}
{% block content %}
<div class="verification-section">
  <div class="overlay"></div>

  <div class="group-wrapper">
    <img class="ellipse" src="{{ url_for('static', filename='profile.png') }}" alt="Logo" />

    <p class="enter-verification">
      Enter Verification Code
      <span>We are automatically detecting a SMS sent to your mobile number ******3476</span>
    </p>

    <div class="frame">
      <input type="text" maxlength="1">
      <input type="text" maxlength="1">
      <input type="text" maxlength="1">
      <input type="text" maxlength="1">
    </div>

    <div class="group-4">
      <p>Don’t receive the OTP ?</p>
      <a href="#">Resend OTP</a>
    </div>

    <div class="keypad">
      <button>1</button><button>2</button><button>3</button>
      <button>4</button><button>5</button><button>6</button>
      <button>7</button><button>8</button><button>9</button>
      <button>*</button><button>0</button><button>#</button>
    </div>
  </div>
</div>

<style>
/* ===== قسم التحقق ===== */
.verification-section {
  position: relative;
  background: url("{{ url_for('static', filename='Rectangle 53.png') }}")
             no-repeat center center/cover;
  /* ✅ من أول الناف بار لحد قبل الفوتر */
  min-height: calc(100vh - var(--footer-height,60px));
  display: flex;
  justify-content: center;
  align-items: center;
  padding-bottom: 40px; /* مسافة قبل الفوتر */
}

/* ===== الطبقة الخضراء الشفافة ===== */
.verification-section .overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(52, 79, 55, 0.55);
  z-index: 0;
}

/* ===== صندوق التحقق ===== */
.group-wrapper {
  width: 420px;
  background-color: rgba(52, 79, 55, 0.9);
  border-radius: 15px;
  padding: 40px;
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

.ellipse {
  width: 110px;
  height: 110px;
  object-fit: cover;
  margin-bottom: 30px;
}

.enter-verification {
  color: #fff;
  text-align: center;
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 20px;
}
.enter-verification span {
  display: block;
  font-size: 15px;
  font-weight: normal;
  margin-top: 8px;
}

.frame {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin: 30px 0;
}
.frame input {
  width: 50px;
  height: 50px;
  border-radius: 10px;
  border: 2px solid #3e6643;
  background-color: #3e6643;
  color: #fff;
  font-size: 28px;
  text-align: center;
  outline: none;
}

.group-4 {
  display: flex;
  justify-content: center;
  gap: 10px;
  color: #fff;
  margin-bottom: 20px;
}
.group-4 a {
  color: #47c456;
  font-weight: bold;
  cursor: pointer;
}

.keypad {
  display: grid;
  grid-template-columns: repeat(3, 60px);
  gap: 20px;
  justify-content: center;
}
.keypad button {
  background-color: #233425;
  border: none;
  border-radius: 15px;
  color: #fff;
  font-size: 24px;
  width: 60px;
  height: 50px;
  cursor: pointer;
  transition: background 0.2s;
}
.keypad button:hover {
  background-color: #2e4631;
}
</style>
{% endblock content %}
